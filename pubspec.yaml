name: campus_connect
description: A comprehensive Campus Connect application for university students, faculty, and staff.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core Dependencies
  google_fonts: ^6.1.0
  provider: ^6.0.5
  shared_preferences: ^2.3.2
  intl: ^0.19.0

  # Navigation & UI
  flutter_native_splash: ^2.3.2
  carousel_slider: ^4.2.1
  smooth_page_indicator: ^1.1.0
  url_launcher: ^6.3.2
  flutter_markdown: ^0.7.0

  # Icons
  cupertino_icons: ^1.0.2
  font_awesome_flutter: ^10.6.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0
  http: ^1.2.0

  # Firebase - UPDATED
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/kisii.jpg
    - assets/icons/kisii.jpg